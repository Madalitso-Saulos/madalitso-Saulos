<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Cybercafe Saulos Techspace</title>
  <desc>Professional GitHub banner with fingerprint scanning interface and welcome message</desc>
  
  <defs>
    <radialGradient id="bgGlow" cx="70%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#0f2a4a"/>
      <stop offset="55%" stop-color="#081a33"/>
      <stop offset="100%" stop-color="#030b18"/>
    </radialGradient>
    <linearGradient id="fpStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8cf0ff"/>
      <stop offset="50%" stop-color="#3acce8"/>
      <stop offset="100%" stop-color="#1a85b8"/>
    </linearGradient>
    <linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8cf0ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#c8faff" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#c8faff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#3acce8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d4feff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d4feff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="haloGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="fpClip">
      <circle cx="430" cy="100" r="56"/>
    </clipPath>
    
    <style>
      .scanline { animation: scan 3s ease-in-out infinite; }
      @keyframes scan { 0%,100% { transform: translateY(-50px); } 50% { transform: translateY(50px); } }
      .pulseWord { animation: pulseW 1.8s ease-in-out infinite; }
      @keyframes pulseW { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
      .dotBlink { animation: blink 1.4s steps(1) infinite; }
      @keyframes blink { 0%,32% { opacity: 1; } 33%,100% { opacity: 0; } }
      .dotBlink2 { animation: blink 1.4s steps(1) infinite 0.45s; }
      .codeFlicker text { animation: flick 4s ease-in-out infinite; }
      @keyframes flick { 0%,100% { opacity: 0.5; } 50% { opacity: 0.9; } }
      .ring { animation: ringPulse 3s ease-in-out infinite; }
      @keyframes ringPulse { 0%,100% { opacity: 0.3; } 50% { opacity: 0.8; } }
      .haloPulse { animation: haloP 2.6s ease-in-out infinite; }
      @keyframes haloP { 0%,100% { opacity: 0.25; } 50% { opacity: 0.55; } }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="600" height="200" fill="url(#bgGlow)"/>

  <!-- Subtle grid lines -->
  <g stroke="#1a4d78" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="48" x2="600" y2="48"/>
    <line x1="0" y1="158" x2="600" y2="158"/>
    <line x1="120" y1="0" x2="120" y2="200"/>
    <line x1="260" y1="0" x2="260" y2="200"/>
  </g>

  <!-- Welcome header -->
  <text x="22" y="28" font-family="monospace" font-size="13" letter-spacing="0.5" fill="#8cf0ff" filter="url(#softGlow)">WELCOME TO CYBERCAFE</text>
  <text x="22" y="46" font-family="monospace" font-size="15" letter-spacing="0.8" fill="#5fe3ff" filter="url(#softGlow)">Saulos Techspace</text>

  <!-- Code snippet -->
  <g class="codeFlicker" font-family="monospace" font-size="9.5" fill="#4a9bd0">
    <text x="22" y="78">const scan = async () =&gt; {</text>
    <text x="38" y="92">match: false,</text>
    <text x="22" y="106">};</text>
    <text x="22" y="128">0x4F2A  0x9C31  0x77E0</text>
    <text x="22" y="148">if (match) grantAccess();</text>
    <text x="22" y="168">confidence: 0.9421</text>
  </g>

  <!-- Fingerprint scanner area -->
  <circle class="haloPulse" cx="430" cy="100" r="75" fill="#3ad4ef" opacity="0.2" filter="url(#haloGlow)"/>

  <g transform="translate(430,100)">
    <!-- Outer rings -->
    <circle class="ring" r="66" fill="none" stroke="#1f5f8f" stroke-width="0.6"/>
    <circle class="ring" r="58" fill="none" stroke="#2b7db0" stroke-width="1" style="animation-delay:0.6s"/>

    <!-- Corner brackets -->
    <g filter="url(#softGlow)">
      <path d="M-52,-52 h12 M-52,-52 v12" stroke="#8cf0ff" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M52,-52 h-12 M52,-52 v12" stroke="#8cf0ff" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M-52,52 h12 M-52,52 v-12" stroke="#8cf0ff" stroke-width="2" stroke-linecap="round" fill="none"/>
      <path d="M52,52 h-12 M52,52 v-12" stroke="#8cf0ff" stroke-width="2" stroke-linecap="round" fill="none"/>
    </g>

    <!-- Fingerprint ridges -->
    <g clip-path="url(#fpClip)" transform="translate(-430,-100)">
      <g transform="translate(430,100)" fill="none" stroke="url(#fpStroke)" stroke-width="2.2" stroke-linecap="round" filter="url(#softGlow)">
        <circle r="6" stroke-dasharray="26 3" stroke-dashoffset="4"/>
        <circle r="12" stroke-dasharray="14 2 20 2" stroke-dashoffset="8"/>
        <circle r="18" stroke-dasharray="30 3 14 3" stroke-dashoffset="2"/>
        <circle r="24" stroke-dasharray="38 3 18 3" stroke-dashoffset="14"/>
        <circle r="30" stroke-dasharray="46 3 26 3" stroke-dashoffset="5"/>
        <circle r="36" stroke-dasharray="54 3 20 3 18 3" stroke-dashoffset="0"/>
        <circle r="42" stroke-dasharray="66 3 28 3" stroke-dashoffset="20"/>
        <circle r="48" stroke-dasharray="74 3 34 3 18 3" stroke-dashoffset="8"/>
        <circle r="54" stroke-dasharray="84 3 40 4" stroke-dashoffset="28"/>
      </g>
    </g>

    <!-- Scanning beam -->
    <g class="scanline">
      <rect x="-58" y="0" width="116" height="10" fill="url(#beamGrad)"/>
      <circle r="3" fill="url(#coreGlow)" filter="url(#bigGlow)"/>
      <rect x="-58" y="3" width="116" height="1.5" fill="#e8fdff"/>
    </g>
  </g>

  <!-- Status -->
  <text x="430" y="182" text-anchor="middle" font-family="monospace" font-size="13" letter-spacing="3.5" fill="#5fe3ff" class="pulseWord" filter="url(#softGlow)">SCANNING</text>
  <g transform="translate(498,179)" fill="#5fe3ff">
    <circle class="dotBlink" cx="0" cy="0" r="1.8"/>
    <circle class="dotBlink2" cx="7" cy="0" r="1.8"/>
  </g>
</svg>
