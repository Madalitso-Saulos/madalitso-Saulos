<svg width="700" height="260" viewBox="0 0 700 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Cybercafe Saulos Techspace - fingerprint scanning banner</title>
<desc>A deep blue GitHub README banner with scattered code, a welcome message for Cybercafe Saulos Techspace, and a glowing fingerprint being scanned with the word SCANNING and two dots below it.</desc>
<defs>
<radialGradient id="bgGlow" cx="72%" cy="38%" r="80%">
<stop offset="0%" stop-color="#0d2c50"/>
<stop offset="55%" stop-color="#071a38"/>
<stop offset="100%" stop-color="#020814"/>
</radialGradient>
<linearGradient id="fpStroke" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#a7f7ff"/>
<stop offset="50%" stop-color="#43daf5"/>
<stop offset="100%" stop-color="#1e93c8"/>
</linearGradient>
<linearGradient id="beamGrad" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#a7f7ff" stop-opacity="0"/>
<stop offset="45%" stop-color="#d4feff" stop-opacity="1"/>
<stop offset="55%" stop-color="#d4feff" stop-opacity="1"/>
<stop offset="100%" stop-color="#43daf5" stop-opacity="0"/>
</linearGradient>
<radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#d4feff" stop-opacity="1"/>
<stop offset="100%" stop-color="#d4feff" stop-opacity="0"/>
</radialGradient>
<filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
<feGaussianBlur stdDeviation="4.5" result="blur"/>
<feMerge><feMergeNode in="blur"/><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="bigGlow" x="-150%" y="-150%" width="400%" height="400%">
<feGaussianBlur stdDeviation="9"/>
</filter>
<filter id="haloGlow" x="-150%" y="-150%" width="400%" height="400%">
<feGaussianBlur stdDeviation="12"/>
</filter>
<clipPath id="fpClip"><circle cx="500" cy="130" r="72"/></clipPath>
<style>
.scanline { animation: scan 3s ease-in-out infinite; }
@keyframes scan { 0% { transform: translateY(-66px); } 50% { transform: translateY(66px); } 100% { transform: translateY(-66px); } }
.pulseWord { animation: pulseW 1.8s ease-in-out infinite; }
@keyframes pulseW { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
.dotBlink { animation: blink 1.4s steps(1) infinite; }
@keyframes blink { 0%,32% { opacity: 1; } 33%,100% { opacity: 0; } }
.dotBlink2 { animation: blink 1.4s steps(1) infinite 0.45s; }
.codeFlicker text { animation: flick 4.5s ease-in-out infinite; }
@keyframes flick { 0%,100% { opacity: 0.6; } 50% { opacity: 0.95; } }
.ring { animation: ringPulse 3s ease-in-out infinite; }
@keyframes ringPulse { 0%,100% { opacity: 0.4; } 50% { opacity: 0.85; } }
.haloPulse { animation: haloP 2.6s ease-in-out infinite; }
@keyframes haloP { 0%,100% { opacity: 0.35; } 50% { opacity: 0.65; } }
</style>
</defs>

<rect x="0" y="0" width="700" height="260" fill="url(#bgGlow)"/>

<g stroke="#1a4d78" stroke-width="0.6" opacity="0.4">
<line x1="0" y1="58" x2="700" y2="58"/>
<line x1="0" y1="210" x2="700" y2="210"/>
<line x1="140" y1="0" x2="140" y2="260"/>
<line x1="300" y1="0" x2="300" y2="260"/>
</g>

<text x="26" y="34" font-family="monospace" font-size="15" letter-spacing="0.5" fill="#a7f7ff" filter="url(#softGlow)">Welcome to Cybercafe...</text>
<text x="26" y="54" font-family="monospace" font-size="15" letter-spacing="0.5" fill="#5fe3ff" filter="url(#softGlow)">Saulos Techspace</text>

<g class="codeFlicker" font-family="monospace" font-size="10.5" fill="#4a9bd0">
<text x="26" y="90">const scan = async () =&gt; {</text>
<text x="44" y="106">match: false,</text>
<text x="26" y="122">};</text>
<text x="26" y="146">0x4F2A  0x9C31  0x77E0</text>
<text x="26" y="168">if (match) grantAccess();</text>
<text x="26" y="190">hash: sha256(input)</text>
<text x="26" y="206">confidence: 0.9421</text>
</g>

<circle class="haloPulse" cx="500" cy="130" r="95" fill="#3ad4ef" opacity="0.25" filter="url(#haloGlow)"/>

<g transform="translate(500,130)">
<circle class="ring" r="84" fill="none" stroke="#1f5f8f" stroke-width="0.8"/>
<circle class="ring" r="74" fill="none" stroke="#2b7db0" stroke-width="1.2" style="animation-delay:0.6s"/>

<g filter="url(#softGlow)">
<path d="M-64,-64 h16 M-64,-64 v16" stroke="#a7f7ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
<path d="M64,-64 h-16 M64,-64 v16" stroke="#a7f7ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
<path d="M-64,64 h16 M-64,64 v-16" stroke="#a7f7ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
<path d="M64,64 h-16 M64,64 v-16" stroke="#a7f7ff" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</g>

<g clip-path="url(#fpClip)" transform="translate(-500,-130)">
<g transform="translate(500,130)" fill="none" stroke="url(#fpStroke)" stroke-width="2.6" stroke-linecap="round" filter="url(#softGlow)">
<circle r="7" stroke-dasharray="30 3" stroke-dashoffset="5"/>
<circle r="14" stroke-dasharray="16 2 24 2" stroke-dashoffset="10"/>
<circle r="21" stroke-dasharray="34 3 16 3" stroke-dashoffset="2"/>
<circle r="28" stroke-dasharray="44 4 20 4" stroke-dashoffset="16"/>
<circle r="35" stroke-dasharray="54 3 30 4" stroke-dashoffset="6"/>
<circle r="42" stroke-dasharray="64 4 24 3 20 4" stroke-dashoffset="0"/>
<circle r="49" stroke-dasharray="78 4 34 4" stroke-dashoffset="24"/>
<circle r="56" stroke-dasharray="88 4 40 4 20 4" stroke-dashoffset="10"/>
<circle r="63" stroke-dasharray="98 4 48 5" stroke-dashoffset="34"/>
<circle r="70" stroke-dasharray="110 5 44 5 28 5" stroke-dashoffset="15"/>
</g>
</g>
<g class="scanline">
<rect x="-74" y="0" width="148" height="12" fill="url(#beamGrad)"/>
<circle r="4" fill="url(#coreGlow)" filter="url(#bigGlow)"/>
<rect x="-74" y="4" width="148" height="2" fill="#f2feff"/>
</g>
</g>

<text x="500" y="234" text-anchor="middle" font-family="monospace" font-size="15" letter-spacing="4" fill="#5fe3ff" class="pulseWord" filter="url(#softGlow)">SCANNING</text>
<g transform="translate(578,231)" fill="#5fe3ff">
<circle class="dotBlink" cx="0" cy="0" r="2.2"/>
<circle class="dotBlink2" cx="8" cy="0" r="2.2"/>
</g>
</svg>
