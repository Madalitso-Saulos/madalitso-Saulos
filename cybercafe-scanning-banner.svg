<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" style="stop-color:#1a2a5e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0e2a;stop-opacity:1"/>
    </radialGradient>

    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Pulse animation for nodes -->
    <animateTransform id="pulse1" attributeName="transform" type="scale" values="1;1.3;1" dur="2s" repeatCount="indefinite"/>
    <animateTransform id="pulse2" attributeName="transform" type="scale" values="1;1.2;1" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    <animateTransform id="pulse3" attributeName="transform" type="scale" values="1;1.4;1" dur="1.8s" repeatCount="indefinite" begin="1s"/>

    <!-- Loading bar animation -->
    <animate id="load1" attributeName="width" values="0;180;0" dur="3s" repeatCount="indefinite"/>
    <animate id="load2" attributeName="width" values="0;250;0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    <animate id="load3" attributeName="width" values="0;130;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    <animate id="load4" attributeName="width" values="0;300;0" dur="3.5s" repeatCount="indefinite" begin="0.3s"/>

    <!-- Network line animation (dash offset) -->
    <animate id="dashAnim1" attributeName="stroke-dashoffset" values="0;-20" dur="1s" repeatCount="indefinite"/>
    <animate id="dashAnim2" attributeName="stroke-dashoffset" values="0;-15" dur="1.2s" repeatCount="indefinite"/>

    <!-- Fingerprint scan animation -->
    <animate id="scanLine" attributeName="cy" values="0;120;0" dur="2s" repeatCount="indefinite"/>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGrad)" rx="12"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#88ccff" stroke-width="0.5"/>
    </pattern>
    <rect width="800" height="500" fill="url(#grid)"/>
  </g>

  <!-- Border glow -->
  <rect width="800" height="500" fill="none" stroke="#2a4a8a" stroke-width="2" rx="12" opacity="0.5"/>

  <!-- ============ NETWORK NODES (Top Right Area) ============ -->
  <g transform="translate(520, 60)" filter="url(#glow)">
    <!-- Connection lines -->
    <g stroke="#4488dd" stroke-width="1.5" opacity="0.6">
      <line x1="0" y1="0" x2="60" y2="50" stroke-dasharray="4,4">
        <animate attributeName="stroke-dashoffset" values="0;-8" dur="0.8s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="80" y2="-10" stroke-dasharray="3,5">
        <animate attributeName="stroke-dashoffset" values="0;-8" dur="1s" repeatCount="indefinite"/>
      </line>
      <line x1="0" y1="0" x2="-20" y2="60" stroke-dasharray="5,3">
        <animate attributeName="stroke-dashoffset" values="0;-8" dur="0.7s" repeatCount="indefinite"/>
      </line>
      <line x1="60" y1="50" x2="80" y2="-10" stroke-dasharray="4,4">
        <animate attributeName="stroke-dashoffset" values="0;-8" dur="1.1s" repeatCount="indefinite"/>
      </line>
      <line x1="60" y1="50" x2="130" y2="30" stroke-dasharray="3,5">
        <animate attributeName="stroke-dashoffset" values="0;-8" dur="0.9s" repeatCount="indefinite"/>
      </line>
      <line x1="80" y1="-10" x2="130" y2="30" stroke-dasharray="4,3">
        <animate attributeName="stroke-dashoffset" values="0;-7" dur="1.2s" repeatCount="indefinite"/>
      </line>
      <line x1="-20" y1="60" x2="60" y2="50" stroke-dasharray="5,4">
        <animate attributeName="stroke-dashoffset" values="0;-9" dur="0.6s" repeatCount="indefinite"/>
      </line>
      <line x1="130" y1="30" x2="160" y2="70" stroke-dasharray="3,4">
        <animate attributeName="stroke-dashoffset" values="0;-7" dur="1.3s" repeatCount="indefinite"/>
      </line>
    </g>

    <!-- Nodes -->
    <g>
      <circle cx="0" cy="0" r="10" fill="#66aaff" opacity="0.9">
        <animate attributeName="r" values="10;13;10" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;1;0.9" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="0" cy="0" r="5" fill="#aaddff"/>
    </g>

    <g>
      <circle cx="60" cy="50" r="8" fill="#44ddbb" opacity="0.9">
        <animate attributeName="r" values="8;11;8" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <circle cx="60" cy="50" r="4" fill="#88ffdd"/>
    </g>

    <g>
      <circle cx="80" cy="-10" r="6" fill="#ff8844" opacity="0.9">
        <animate attributeName="r" values="6;9;6" dur="1.8s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <circle cx="80" cy="-10" r="3" fill="#ffbb88"/>
    </g>

    <g>
      <circle cx="-20" cy="60" r="7" fill="#aa66ff" opacity="0.9">
        <animate attributeName="r" values="7;10;7" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
      </circle>
      <circle cx="-20" cy="60" r="3.5" fill="#ddbbff"/>
    </g>

    <g>
      <circle cx="130" cy="30" r="9" fill="#66ff99" opacity="0.9">
        <animate attributeName="r" values="9;12;9" dur="1.6s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
      <circle cx="130" cy="30" r="4.5" fill="#bbffdd"/>
    </g>

    <g>
      <circle cx="160" cy="70" r="5" fill="#ff66aa" opacity="0.8">
        <animate attributeName="r" values="5;8;5" dur="2.8s" repeatCount="indefinite" begin="0.2s"/>
      </circle>
      <circle cx="160" cy="70" r="2.5" fill="#ffbbdd"/>
    </g>
  </g>

  <!-- Network label -->
  <text x="530" y="175" font-family="'Courier New', monospace" font-size="10" fill="#4488dd" opacity="0.7">● NETWORK NODES</text>

  <!-- ============ CODE BLOCK (Left Side) ============ -->
  <g transform="translate(30, 30)">
    <!-- Code block background -->
    <rect x="0" y="0" width="200" height="140" rx="6" fill="#0a0e1a" stroke="#1a3a6a" stroke-width="1" opacity="0.8"/>

    <!-- Window dots -->
    <circle cx="12" cy="12" r="4" fill="#ff5f56" opacity="0.7"/>
    <circle cx="26" cy="12" r="4" fill="#ffbd2e" opacity="0.7"/>
    <circle cx="40" cy="12" r="4" fill="#27c93f" opacity="0.7"/>

    <!-- Code lines with typing cursor animation -->
    <g font-family="'Courier New', monospace" font-size="10" fill="#66aaff">
      <!-- Line 1 -->
      <text x="10" y="40">$ git clone repo</text>
      <text x="10" y="40" fill="#88ddff" opacity="0">|</text>

      <!-- Line 2 -->
      <text x="10" y="58" fill="#88dd88">function init() {</text>

      <!-- Line 3 -->
      <text x="20" y="76" fill="#ffaa66">const node = new Node();</text>

      <!-- Line 4 -->
      <text x="20" y="94" fill="#66ddff">node.connect(</text>

      <!-- Line 5 -->
      <text x="30" y="112" fill="#dd88ff">"network",</text>

      <!-- Line 6 -->
      <text x="30" y="130" fill="#ff8888">port: 8080</text>

      <!-- Blinking cursor at end -->
      <text x="10" y="40" fill="#88ddff" opacity="1">
        <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- Code block label -->
  <text x="35" y="185" font-family="'Courier New', monospace" font-size="10" fill="#4488dd" opacity="0.7">◀ DEPLOYMENT CODE</text>

  <!-- ============ LOADING BARS (Center Bottom) ============ -->
  <g transform="translate(40, 230)">
    <text x="0" y="0" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#88bbee" opacity="0.8">SYSTEM STATUS</text>

    <!-- Bar 1 -->
    <text x="0" y="25" font-family="'Courier New', monospace" font-size="9" fill="#4488aa">● LOADING MODULES</text>
    <rect x="0" y="32" width="200" height="6" rx="3" fill="#0a1a3a" stroke="#1a4a7a" stroke-width="0.5"/>
    <rect x="0" y="32" width="0" height="6" rx="3" fill="#44ddff" opacity="0.8">
      <animate attributeName="width" values="0;180;0" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Bar 2 -->
    <text x="0" y="52" font-family="'Courier New', monospace" font-size="9" fill="#4488aa">● NETWORK SYNC</text>
    <rect x="0" y="59" width="200" height="6" rx="3" fill="#0a1a3a" stroke="#1a4a7a" stroke-width="0.5"/>
    <rect x="0" y="59" width="0" height="6" rx="3" fill="#66ff88" opacity="0.8">
      <animate attributeName="width" values="0;250;0" dur="4s" repeatCount="indefinite" begin="0.5s"/>
    </rect>

    <!-- Bar 3 -->
    <text x="0" y="79" font-family="'Courier New', monospace" font-size="9" fill="#4488aa">● AUTHENTICATION</text>
    <rect x="0" y="86" width="200" height="6" rx="3" fill="#0a1a3a" stroke="#1a4a7a" stroke-width="0.5"/>
    <rect x="0" y="86" width="0" height="6" rx="3" fill="#ff8844" opacity="0.8">
      <animate attributeName="width" values="0;130;0" dur="2.5s" repeatCount="indefinite" begin="1s"/>
    </rect>

    <!-- Bar 4 -->
    <text x="0" y="106" font-family="'Courier New', monospace" font-size="9" fill="#4488aa">● DATA STREAM</text>
    <rect x="0" y="113" width="200" height="6" rx="3" fill="#0a1a3a" stroke="#1a4a7a" stroke-width="0.5"/>
    <rect x="0" y="113" width="0" height="6" rx="3" fill="#aa66ff" opacity="0.8">
      <animate attributeName="width" values="0;300;0" dur="3.5s" repeatCount="indefinite" begin="0.3s"/>
    </rect>
  </g>

  <!-- ============ FINGERPRINT (Right Side) ============ -->
  <g transform="translate(600, 230)">
    <!-- Scan ring -->
    <circle cx="80" cy="60" r="58" fill="none" stroke="#1a4a7a" stroke-width="1" opacity="0.3"/>

    <!-- Fingerprint arcs -->
    <g stroke="#66ddff" stroke-width="2" fill="none" opacity="0.6" filter="url(#softGlow)">
      <!-- Outer arc -->
      <path d="M 30 80 Q 40 30 80 20 Q 120 30 130 80"/>
      <!-- Second arc -->
      <path d="M 35 70 Q 45 40 80 32 Q 115 40 125 70"/>
      <!-- Third arc -->
      <path d="M 40 60 Q 50 45 80 40 Q 110 45 120 60"/>
      <!-- Fourth arc -->
      <path d="M 45 52 Q 55 48 80 46 Q 105 48 115 52"/>
      <!-- Inner arc -->
      <path d="M 50 46 Q 60 44 80 43 Q 100 44 110 46"/>
      <!-- Small inner -->
      <path d="M 60 42 Q 70 41 80 41 Q 90 41 100 42"/>
      <!-- Center -->
      <circle cx="80" cy="42" r="4" stroke-width="1.5" fill="#66ddff" opacity="0.4"/>
    </g>

    <!-- Scanning line -->
    <line x1="22" y1="0" x2="22" y2="120" stroke="#44ddff" stroke-width="1" opacity="0.4">
      <animate attributeName="x1" values="22;138;22" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="22;138;22" dur="2.5s" repeatCount="indefinite"/>
    </line>

    <!-- Horizontal scan line -->
    <line x1="20" y1="60" x2="140" y2="60" stroke="#66ddff" stroke-width="1.5" opacity="0.6" filter="url(#glow)">
      <animate attributeName="y1" values="15;105;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="15;105;15" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite"/>
    </line>

    <!-- Corner brackets -->
    <g stroke="#66ddff" stroke-width="1.5" opacity="0.5">
      <path d="M 18 10 L 18 18 L 26 18"/>
      <path d="M 142 10 L 142 18 L 134 18"/>
      <path d="M 18 110 L 18 102 L 26 102"/>
      <path d="M 142 110 L 142 102 L 134 102"/>
    </g>

    <!-- Fingerprint label -->
    <text x="80" y="135" font-family="'Courier New', monospace" font-size="9" fill="#4488dd" text-anchor="middle" opacity="0.7">SCANNING...</text>
  </g>

  <!-- ============ DECORATIVE ELEMENTS ============ -->

  <!-- Top left corner decorative -->
  <path d="M 15 15 L 15 40 M 15 15 L 40 15" stroke="#4488dd" stroke-width="1.5" opacity="0.3" fill="none"/>

  <!-- Bottom right corner decorative -->
  <path d="M 785 485 L 785 460 M 785 485 L 760 485" stroke="#4488dd" stroke-width="1.5" opacity="0.3" fill="none"/>

  <!-- Small floating particles -->
  <g opacity="0.15">
    <circle cx="450" cy="50" r="2" fill="#66ddff">
      <animate attributeName="cy" values="50;40;50" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.15;0.3;0.15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="380" cy="180" r="1.5" fill="#88ffaa">
      <animate attributeName="cx" values="380;390;380" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="190" r="1.5" fill="#ff88aa">
      <animate attributeName="cy" values="190;180;190" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="420" cy="400" r="2" fill="#66ddff">
      <animate attributeName="cy" values="400;390;400" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Status LED indicators -->
  <g transform="translate(300, 450)">
    <circle cx="0" cy="0" r="4" fill="#44ff88" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.4;0.9" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="10" y="3" font-family="'Courier New', monospace" font-size="8" fill="#4488aa">ACTIVE</text>

    <circle cx="80" cy="0" r="4" fill="#ff8844">
      <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="90" y="3" font-family="'Courier New', monospace" font-size="8" fill="#4488aa">SYNC</text>
  </g>

  <!-- Version text -->
  <text x="690" y="475" font-family="'Courier New', monospace" font-size="8" fill="#1a4a7a" opacity="0.5">v3.2.1 ● SECURE</text>

</svg>
