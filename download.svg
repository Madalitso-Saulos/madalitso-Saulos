<svg width="1200" height="640" viewBox="0 0 1200 640"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#040711"/>
      <stop offset="55%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0d1f2f"/>
    </linearGradient>

    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="50%" stop-color="#00ffb0"/>
      <stop offset="100%" stop-color="#00d4ff"/>
    </linearGradient>

    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7fe9ff"/>
    </linearGradient>

    <linearGradient id="panelFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ffcf"/>
      <stop offset="100%" stop-color="#0091ff"/>
    </linearGradient>

    <linearGradient id="footerFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0.08"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.4"/>
    </filter>

    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Fine grid -->
  <g opacity="0.05">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200" stroke="#00ffff"/>
    <path d="M100 0 V640 M200 0 V640 M300 0 V640 M400 0 V640
             M500 0 V640 M600 0 V640 M700 0 V640 M800 0 V640
             M900 0 V640 M1000 0 V640 M1100 0 V640" stroke="#00ffff"/>
  </g>

  <!-- Outer frame for a polished, contained look -->
  <rect x="6" y="6" width="1188" height="628" rx="10"
        fill="none" stroke="#00d4ff" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- ============ LEFT: BRAND PANEL ============ -->
  <g>
    <rect x="0" y="0" width="390" height="640" fill="url(#panelFade)"/>
    <line x1="390" y1="20" x2="390" y2="620" stroke="#00d4ff" stroke-opacity="0.3" stroke-width="1"/>

    <!-- Mark -->
    <g transform="translate(48,58)" filter="url(#glow)">
      <polygon points="16,0 32,9 32,27 16,36 0,27 0,9"
               fill="none" stroke="#00ffcf" stroke-width="2"/>
      <circle cx="16" cy="18" r="4" fill="#00ffcf"/>
    </g>

    <text x="94" y="72" fill="#7fe9ff" font-size="13" letter-spacing="4"
          font-family="Consolas, 'Courier New', monospace">SAULOS TECH</text>

    <text x="48" y="150" fill="url(#brandGradient)" font-size="40" font-weight="700"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif" filter="url(#softGlow)">
      WELCOME TO
    </text>
    <text x="48" y="196" fill="url(#brandGradient)" font-size="40" font-weight="700"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif" filter="url(#softGlow)">
      CYBERCAFE
    </text>

    <rect x="49" y="214" width="64" height="3" fill="#00ffb0"/>

    <text x="48" y="248" fill="#9db4c0" font-size="14"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      High-speed internet &#183; Printing &#183; IT support
    </text>

    <!-- ===== Cybersecurity shield badge ===== -->
    <g transform="translate(48,290)">
      <g filter="url(#strongGlow)">
        <path d="M40 0 L78 14 V52 C78 84 58 104 40 114 C22 104 2 84 2 52 V14 Z"
              fill="none" stroke="url(#shieldGrad)" stroke-width="2.5"/>
      </g>
      <path d="M40 0 L78 14 V52 C78 84 58 104 40 114 C22 104 2 84 2 52 V14 Z"
            fill="#00d4ff" fill-opacity="0.06"/>
      <!-- lock -->
      <rect x="24" y="48" width="32" height="24" rx="3" fill="none" stroke="#00ffcf" stroke-width="2"/>
      <path d="M30 48 V38 a10 10 0 0 1 20 0 V48" fill="none" stroke="#00ffcf" stroke-width="2"/>
      <circle cx="40" cy="60" r="3" fill="#00ffcf">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
      </circle>

      <text x="98" y="20" fill="#e6f6fb" font-size="13" font-weight="600"
            font-family="'Segoe UI', Helvetica, Arial, sans-serif">SECURE ACCESS</text>
      <text x="98" y="42" fill="#00ff95" font-size="12"
            font-family="Consolas, 'Courier New', monospace">firewall: enabled</text>
      <text x="98" y="62" fill="#00ff95" font-size="12"
            font-family="Consolas, 'Courier New', monospace">encryption: AES-256</text>
      <text x="98" y="82" fill="#00ff95" font-size="12"
            font-family="Consolas, 'Courier New', monospace">
        threat_scan: clear
        <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
      </text>
    </g>

    <text x="48" y="576" fill="#4fe3d1" font-size="12" letter-spacing="2"
          font-family="Consolas, 'Courier New', monospace" opacity="0.85">
      POWERED BY SAULOS TECH
    </text>
  </g>

  <!-- ============ CENTER: TERMINAL / CODE ============ -->
  <g transform="translate(430,0)">

    <text x="0" y="46" fill="#00e5ff" font-size="15" letter-spacing="3"
          font-family="Consolas, 'Courier New', monospace" filter="url(#glow)">
      SYSTEM INITIALIZATION
    </text>

    <!-- Terminal window -->
    <rect x="0" y="62" width="360" height="150" rx="8"
          fill="#061019" stroke="#00d4ff" stroke-opacity="0.35" stroke-width="1"/>
    <circle cx="16" cy="78" r="4" fill="#ff5f56"/>
    <circle cx="30" cy="78" r="4" fill="#ffbd2e"/>
    <circle cx="44" cy="78" r="4" fill="#27c93f"/>

    <g fill="#00ff95" font-family="Consolas, 'Courier New', monospace" font-size="13">
      <text x="16" y="104">&gt; const protocol = "ACTIVE";</text>
      <text x="16" y="126">&gt; encrypt(data_stream);</text>
      <text x="16" y="148">&gt; sync_nodes(1024);</text>
      <text x="16" y="170">&gt; await quantumHandshake();</text>
      <text x="16" y="192">&gt; AI_CORE.STATUS = ONLINE;
        <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Typing cursor forming code -->
    <rect x="216" y="181" width="8" height="14" fill="#00ff95">
      <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite"/>
    </rect>

    <!-- Progress -->
    <text x="0" y="248" fill="#e6f6fb" font-size="13"
          font-family="Consolas, 'Courier New', monospace" letter-spacing="1">
      LOADING CORE MODULES...
    </text>

    <rect x="0" y="262" width="360" height="12" rx="6"
          fill="#08131f" stroke="#00d4ff" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="0" y="262" width="80" height="12" rx="6" fill="url(#progressGradient)" filter="url(#glow)">
      <animate attributeName="width" values="80;330;80" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Floating binary -->
    <g fill="#00cfff" font-size="14" font-family="Consolas, 'Courier New', monospace" opacity="0.75">
      <text x="4" y="320">101101
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -14;0 0" dur="4s" repeatCount="indefinite"/>
      </text>
      <text x="100" y="330">010101
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -10;0 0" dur="5s" repeatCount="indefinite"/>
      </text>
      <text x="196" y="320">111000
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -12;0 0" dur="4.5s" repeatCount="indefinite"/>
      </text>
      <text x="292" y="330">001101
        <animateTransform attributeName="transform" type="translate" values="0 0;0 -11;0 0" dur="5.5s" repeatCount="indefinite"/>
      </text>
    </g>

    <text x="0" y="366" fill="#5c7d8a" font-size="11" letter-spacing="1"
          font-family="Consolas, 'Courier New', monospace">
      SESSION READY &#8226; NODE-014 &#8226; UPTIME 99.98%
    </text>

    <!-- ===== Cybersecurity console: threat log ===== -->
    <text x="0" y="410" fill="#00e5ff" font-size="14" letter-spacing="2"
          font-family="Consolas, 'Courier New', monospace" filter="url(#glow)">
      SECURITY OPERATIONS LOG
    </text>

    <rect x="0" y="424" width="360" height="150" rx="8"
          fill="#061019" stroke="#00d4ff" stroke-opacity="0.35" stroke-width="1"/>

    <g font-family="Consolas, 'Courier New', monospace" font-size="12.5">
      <text x="16" y="450" fill="#00ff95">[OK] intrusion_detection --status</text>
      <text x="16" y="472" fill="#00ff95">[OK] vpn_tunnel.connect(client_014)</text>
      <text x="16" y="494" fill="#ffbd2e">[WARN] port_scan detected: 192.168.x.x</text>
      <text x="16" y="516" fill="#00ff95">[OK] auto_block(source_ip); logged;</text>
      <text x="16" y="538" fill="#00ff95">
        [OK] malware_scan: 0 threats found
        <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
      </text>
      <text x="16" y="560" fill="#7fe9ff">$ tail -f /var/log/secure.log_</text>
    </g>

    <!-- blinking cursor on log -->
    <rect x="196" y="550" width="7" height="12" fill="#7fe9ff">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ============ RIGHT: NETWORK + SCAN RADAR ============ -->
  <g transform="translate(850,50)">

    <!-- Links -->
    <g stroke="#00cfff" stroke-width="1.3" opacity="0.55">
      <line x1="30" y1="60" x2="120" y2="30"/>
      <line x1="30" y1="60" x2="105" y2="120"/>
      <line x1="120" y1="30" x2="190" y2="70"/>
      <line x1="105" y1="120" x2="190" y2="70"/>
      <line x1="190" y1="70" x2="250" y2="130"/>
      <line x1="190" y1="70" x2="255" y2="20"/>
      <line x1="255" y1="20" x2="315" y2="45"/>
      <line x1="250" y1="130" x2="315" y2="150"/>
      <line x1="315" y1="45" x2="315" y2="150"/>
      <line x1="315" y1="150" x2="20" y2="185"/>
      <animate attributeName="opacity" values="0.3;0.75;0.3" dur="3s" repeatCount="indefinite"/>
    </g>

    <!-- Nodes -->
    <g fill="#00ffff">
      <circle cx="30" cy="60" r="5">
        <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="120" cy="30" r="5">
        <animate attributeName="r" values="5;7;5" begin="0.3s" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="105" cy="120" r="5">
        <animate attributeName="r" values="5;7;5" begin="0.6s" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="190" cy="70" r="7">
        <animate attributeName="r" values="7;10;7" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="250" cy="130" r="5">
        <animate attributeName="r" values="5;7;5" begin="1s" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="255" cy="20" r="5">
        <animate attributeName="r" values="5;7;5" begin="1.3s" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- new nodes -->
      <circle cx="315" cy="45" r="5">
        <animate attributeName="r" values="5;7;5" begin="0.8s" dur="2.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="315" cy="150" r="5">
        <animate attributeName="r" values="5;7;5" begin="1.6s" dur="2.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Status -->
    <text x="0" y="222" fill="#00ff95" font-size="12" letter-spacing="1"
          font-family="Consolas, 'Courier New', monospace">
      NETWORK STATUS : CONNECTED
    </text>

    <!-- ===== Radar / scanning sweep ===== -->
    <g transform="translate(160,330)">
      <text x="-160" y="-10" fill="#00e5ff" font-size="13" letter-spacing="2"
            font-family="Consolas, 'Courier New', monospace">THREAT RADAR</text>

      <circle r="90" fill="#061019" stroke="#00d4ff" stroke-opacity="0.4" stroke-width="1.5"/>
      <circle r="60" fill="none" stroke="#00d4ff" stroke-opacity="0.25" stroke-width="1"/>
      <circle r="30" fill="none" stroke="#00d4ff" stroke-opacity="0.25" stroke-width="1"/>
      <line x1="-90" y1="0" x2="90" y2="0" stroke="#00d4ff" stroke-opacity="0.2"/>
      <line x1="0" y1="-90" x2="0" y2="90" stroke="#00d4ff" stroke-opacity="0.2"/>

      <!-- sweep -->
      <g>
        <path d="M0 0 L0 -90 A90 90 0 0 1 63.6 -63.6 Z" fill="#00ffb0" opacity="0.25"/>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0"
                           dur="4s" repeatCount="indefinite"/>
      </g>

      <!-- blips -->
      <circle cx="35" cy="-20" r="3.5" fill="#ff5f56">
        <animate attributeName="opacity" values="0;1;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-50" cy="30" r="3.5" fill="#ffbd2e">
        <animate attributeName="opacity" values="0;1;0" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="20" cy="55" r="3.5" fill="#00ff95">
        <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0.2s" repeatCount="indefinite"/>
      </circle>

      <circle r="4" fill="#00ffcf" filter="url(#glow)"/>
    </g>

    <!-- code snippet beside radar -->
    <g font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#00ff95">
      <text x="-40" y="470">scan.run(target="LAN");</text>
      <text x="-40" y="490">alerts.push(anomaly);</text>
      <text x="-40" y="510">status = "SECURED";
        <animate attributeName="opacity" values="1;0.35;1" dur="2s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <!-- ============ FOOTER STRIP ============ -->
  <rect x="6" y="596" width="1188" height="38" fill="url(#footerFade)"/>
  <line x1="0" y1="596" x2="1200" y2="596" stroke="#00d4ff" stroke-opacity="0.25" stroke-width="1"/>
  <g font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#7fe9ff" opacity="0.85">
    <text x="30" y="620">SSL/TLS SECURED</text>
    <text x="240" y="620">24/7 MONITORING</text>
    <text x="470" y="620">DATA PRIVACY COMPLIANT</text>
    <text x="760" y="620">BACKUP: AUTOMATED</text>
    <text x="990" y="620">
      UPTIME 99.98%
      <animate attributeName="opacity" values="0.85;0.4;0.85" dur="2.5s" repeatCount="indefinite"/>
    </text>
  </g>

</svg>
