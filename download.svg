<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260" role="img">
<title>Cybercafe animated banner</title>
<desc>Animated network of blue nodes, flickering Linux terminal text, and a pulsing loading bar on a black background</desc>

<defs>
<radialGradient id="bgGrad" cx="70%" cy="40%" r="80%">
<stop offset="0%" stop-color="#0a0f14"/>
<stop offset="100%" stop-color="#000000"/>
</radialGradient>
<linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#b5342c"/>
<stop offset="100%" stop-color="#3ab0ff"/>
</linearGradient>
<linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
<stop offset="0%" stop-color="#3ab0ff" stop-opacity="0"/>
<stop offset="50%" stop-color="#3ab0ff" stop-opacity="0.55"/>
<stop offset="100%" stop-color="#3ab0ff" stop-opacity="0"/>
</linearGradient>
<filter id="nodeGlow" x="-80%" y="-80%" width="260%" height="260%">
<feGaussianBlur stdDeviation="2.2" result="blur"/>
<feMerge>
  
<feMergeNode in="blur"/>
<feMergeNode in="SourceGraphic"/>
</feMerge>
</filter>
  
<filter id="textGlowRed" x="-50%" y="-50%" width="200%" height="200%">
<feDropShadow dx="0" dy="0" stdDeviation="1.4" flood-color="#b5342c" flood-opacity="0.55"/>
</filter>
<filter id="textGlowWhite" x="-50%" y="-50%" width="200%" height="200%">
<feDropShadow dx="0" dy="0" stdDeviation="1.2" flood-color="#e8e8e8" flood-opacity="0.35"/>
</filter>
<clipPath id="frame">
<rect x="0" y="0" width="800" height="260" rx="12"/>
</clipPath>
</defs>
<g clip-path="url(#frame)">
<rect x="0" y="0" width="800" height="260" fill="url(#bgGrad)"/>
  
<g stroke="url(#lineGrad)" stroke-width="0.7">
<line x1="380" y1="30" x2="450" y2="80"><animate attributeName="opacity" values="0.15;0.5;0.15" dur="3.2s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="380" y1="30" x2="500" y2="45"><animate attributeName="opacity" values="0.45;0.1;0.45" dur="2.6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="380" y1="30" x2="420" y2="120"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="4.1s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="450" y1="80" x2="500" y2="45"><animate attributeName="opacity" values="0.5;0.18;0.5" dur="3.6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="450" y1="80" x2="550" y2="150"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.9s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="450" y1="80" x2="420" y2="120"><animate attributeName="opacity" values="0.45;0.15;0.45" dur="3.4s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="500" y1="45" x2="620" y2="90"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.4s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="500" y1="45" x2="550" y2="150"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="420" y1="120" x2="550" y2="150"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.1s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="420" y1="120" x2="380" y2="180"><animate attributeName="opacity" values="0.45;0.15;0.45" dur="2.7s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="550" y1="150" x2="620" y2="90"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.9s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="550" y1="150" x2="700" y2="140"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="620" y1="90" x2="700" y2="140"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="620" y1="90" x2="750" y2="60"><animate attributeName="opacity" values="0.45;0.15;0.45" dur="2.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="380" y1="180" x2="450" y2="220"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="380" y1="180" x2="550" y2="200"><animate attributeName="opacity" values="0.5;0.18;0.5" dur="2.3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="450" y1="220" x2="550" y2="200"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="4s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="700" y1="140" x2="750" y2="60"><animate attributeName="opacity" values="0.45;0.2;0.45" dur="3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="700" y1="140" x2="650" y2="210"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="550" y1="200" x2="650" y2="210"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.7s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="650" y1="210" x2="750" y2="60"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.2s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
</g>

<g fill="#3ab0ff" filter="url(#nodeGlow)">
<circle cx="380" cy="30" r="2.4"><animate attributeName="cy" values="30;23;30" dur="5s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.4;3.3;2.4" dur="2s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="450" cy="80" r="1.8"><animate attributeName="cx" values="450;459;450" dur="4.5s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.8;2.6;1.8" dur="2.3s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="500" cy="45" r="2.1"><animate attributeName="cy" values="45;53;45" dur="6s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.1;3;2.1" dur="1.9s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="420" cy="120" r="1.5"><animate attributeName="cx" values="420;411;420" dur="5.3s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.5;2.3;1.5" dur="2.5s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="550" cy="150" r="2.7"><animate attributeName="cy" values="150;159;150" dur="4.8s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.7;3.6;2.7" dur="2.1s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="620" cy="90" r="1.9"><animate attributeName="cx" values="620;629;620" dur="5.6s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.9;2.7;1.9" dur="2.4s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="380" cy="180" r="2" ><animate attributeName="cy" values="180;172;180" dur="4.2s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2;2.8;2" dur="2.2s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="700" cy="140" r="2.2"><animate attributeName="cx" values="700;691;700" dur="5.1s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.2;3.1;2.2" dur="1.8s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="750" cy="60" r="1.6"><animate attributeName="cy" values="60;69;60" dur="4.7s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.6;2.4;1.6" dur="2.6s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="450" cy="220" r="1.9"><animate attributeName="cx" values="450;441;450" dur="5.4s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.9;2.7;1.9" dur="2s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="550" cy="200" r="2.6"><animate attributeName="cy" values="200;208;200" dur="4.4s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.6;3.5;2.6" dur="2.3s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="650" cy="210" r="1.8"><animate attributeName="cx" values="650;659;650" dur="5.8s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.8;2.6;1.8" dur="1.9s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
</g>

<g font-family="'Courier New', monospace" font-size="14">

<text x="20" y="65" fill="#b5342c" filter="url(#textGlowRed)">
root@cybercafe:~$ ssh admin@10.0.0.1
<animate attributeName="opacity" values="0.9;0.3;0.9" dur="3.4s" repeatCount="indefinite"/>
</text>

<text x="20" y="83" fill="#00ff99" filter="url(#textGlowWhite)">
$ WELCOME TO CYBERCAFE...
<animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.8s" repeatCount="indefinite"/>
</text>

<text x="20" y="101" fill="#e8e8e8" filter="url(#textGlowWhite)">
&gt; Saulos@Github:~$ ./secure_profile
<animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.5s" repeatCount="indefinite"/>
</text>

<text x="20" y="119" fill="#00ff99" filter="url(#textGlowWhite)">
[ OK ] Saulos Github connected
<animate attributeName="opacity" values="0.9;0.35;0.9" dur="3.9s" repeatCount="indefinite"/>
</text>

<text x="20" y="137" fill="#e8e8e8" filter="url(#textGlowWhite)">
PING 192.168.1.1 56(84) bytes
<animate attributeName="opacity" values="0.65;0.2;0.65" dur="4.1s" repeatCount="indefinite"/>
</text>

<text x="20" y="155" fill="#00ff99" filter="url(#textGlowWhite)">
[ OK ] Network daemon started
<animate attributeName="opacity" values="0.9;0.35;0.9" dur="3.9s" repeatCount="indefinite"/>
</text>

<text x="20" y="173" fill="#b5342c" filter="url(#textGlowRed)">
sudo systemctl status firewall
<animate attributeName="opacity" values="0.4;0.9;0.4" dur="2.5s" repeatCount="indefinite"/>
</text>

<text x="20" y="191" fill="#e8e8e8" filter="url(#textGlowWhite)">
&gt; create --secure --deploy project
<animate attributeName="opacity" values="0.6;0.2;0.6" dur="3.6s" repeatCount="indefinite"/>
</text>

<text x="20" y="209" fill="#00ff99" filter="url(#textGlowWhite)">
[ DONE ] Create. Secure. Deploy.
<animate attributeName="opacity" values="0.9;0.4;0.9" dur="4.4s" repeatCount="indefinite"/>
</text>

<text x="20" y="227" fill="#e8e8e8" filter="url(#textGlowWhite)">
Thanks for visiting here :)
<animate attributeName="opacity" values="0.5;0.9;0.5" dur="3.7s" repeatCount="indefinite"/>
</text>

</g>

<circle cx="880" cy="70" r="3" fill="#b5342c">
<animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
</circle>

<circle cx="880" cy="180" r="2.5" fill="#3ab0ff">
<animate attributeName="cy" values="180;170;180" dur="3s" repeatCount="indefinite"/>
</circle>


<rect x="36" y="152" width="150" height="4" rx="2" fill="#111" stroke="#1d3a4a" stroke-width="0.6"/>
<rect x="36" y="152" width="0" height="4" rx="2" fill="url(#barGrad)">
<animate attributeName="width" values="0;150;0" keyTimes="0;0.85;1" dur="5s" calcMode="spline" keySplines="0.25 0.1 0.25 1;0.4 0 1 1" repeatCount="indefinite"/>
</rect>
<rect x="36" y="152" width="150" height="4" rx="2" fill="#3ab0ff" opacity="0">
<animate attributeName="opacity" values="0;0.5;0" dur="5s" repeatCount="indefinite"/>
</rect>
</g>
</svg>
