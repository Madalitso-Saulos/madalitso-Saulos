<svg width="1200" height="260" viewBox="0 0 1200 260"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#03050b"/>
      <stop offset="55%" stop-color="#070f1a"/>
      <stop offset="100%" stop-color="#08141d"/>
    </linearGradient>

    <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1b8fa8"/>
      <stop offset="50%" stop-color="#1fae8c"/>
      <stop offset="100%" stop-color="#1b8fa8"/>
    </linearGradient>

    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eef6f9"/>
      <stop offset="100%" stop-color="#8fc7d6"/>
    </linearGradient>

    <linearGradient id="panelFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1596b5" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#1596b5" stop-opacity="0"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Fine grid -->
  <g opacity="0.035">
    <path d="M0 52 H1200 M0 104 H1200 M0 156 H1200 M0 208 H1200" stroke="#4fd1e0"/>
    <path d="M100 0 V260 M200 0 V260 M300 0 V260 M400 0 V260
             M500 0 V260 M600 0 V260 M700 0 V260 M800 0 V260
             M900 0 V260 M1000 0 V260 M1100 0 V260" stroke="#4fd1e0"/>
  </g>

  <!-- Outer frame -->
  <rect x="5" y="5" width="1190" height="250" rx="8"
        fill="none" stroke="#3fb8d1" stroke-opacity="0.18" stroke-width="1.2"/>

  <!-- ============ LEFT: BRAND PANEL ============ -->
  <g>
    <rect x="0" y="0" width="380" height="260" fill="url(#panelFade)"/>
    <line x1="380" y1="16" x2="380" y2="244" stroke="#3fb8d1" stroke-opacity="0.2" stroke-width="1"/>

    <!-- Mark -->
    <g transform="translate(46,36)">
      <polygon points="13,0 26,7 26,21 13,28 0,21 0,7"
               fill="none" stroke="#4fc6b0" stroke-width="1.6" stroke-opacity="0.85"/>
      <circle cx="13" cy="14" r="3" fill="#4fc6b0" opacity="0.85"/>
    </g>

    <text x="86" y="47" fill="#7fb9c9" font-size="11.5" letter-spacing="3.5"
          font-family="Consolas, 'Courier New', monospace">SAULOS TECH</text>

    <text x="46" y="106" fill="url(#brandGradient)" font-size="30" font-weight="600"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      WELCOME TO
    </text>
    <text x="46" y="140" fill="url(#brandGradient)" font-size="30" font-weight="600"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      CYBERCAFE
    </text>

    <rect x="47" y="153" width="52" height="2.5" fill="#2f9c88" opacity="0.85"/>

    <text x="46" y="180" fill="#7e94a0" font-size="12.5"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      High-speed internet &#183; Printing &#183; IT support
    </text>

    <text x="46" y="222" fill="#3f8f88" font-size="10.5" letter-spacing="2"
          font-family="Consolas, 'Courier New', monospace" opacity="0.8">
      POWERED BY SAULOS TECH
    </text>
  </g>

  <!-- ============ CENTER: TERMINAL / CODE ============ -->
  <g transform="translate(420,0)">

    <text x="0" y="30" fill="#5fbfd6" font-size="13" letter-spacing="2.5"
          font-family="Consolas, 'Courier New', monospace">
      SYSTEM INITIALIZATION
    </text>

    <!-- Terminal window -->
    <rect x="0" y="42" width="360" height="122" rx="6"
          fill="#050b12" stroke="#3fb8d1" stroke-opacity="0.22" stroke-width="1"/>
    <circle cx="14" cy="56" r="3.2" fill="#7a4a48" opacity="0.8"/>
    <circle cx="26" cy="56" r="3.2" fill="#7a6a3f" opacity="0.8"/>
    <circle cx="38" cy="56" r="3.2" fill="#417a4c" opacity="0.8"/>

    <g fill="#4fae8c" font-family="Consolas, 'Courier New', monospace" font-size="12">
      <text x="14" y="76">&gt; const protocol = "ACTIVE";</text>
      <text x="14" y="95">&gt; encrypt(data_stream);</text>
      <text x="14" y="114">&gt; sync_nodes(1024);</text>
      <text x="14" y="133">&gt; await quantumHandshake();</text>
      <text x="14" y="152">&gt; AI_CORE.STATUS = ONLINE;
        <animate attributeName="opacity" values="0.55;1;0.55" dur="4s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Steady cursor, gentle fade -->
    <rect x="208" y="143" width="6" height="12" fill="#4fae8c" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.15;0.8" dur="2.4s" repeatCount="indefinite"/>
    </rect>

    <!-- Progress -->
    <text x="0" y="192" fill="#c3d3d9" font-size="12"
          font-family="Consolas, 'Courier New', monospace" letter-spacing="1">
      LOADING CORE MODULES...
    </text>

    <rect x="0" y="204" width="360" height="9" rx="4.5"
          fill="#070f16" stroke="#3fb8d1" stroke-opacity="0.25" stroke-width="1"/>
    <rect x="0" y="204" width="90" height="9" rx="4.5" fill="url(#progressGradient)">
      <animate attributeName="width" values="90;300;90" dur="10s" repeatCount="indefinite"/>
    </rect>

    <text x="0" y="238" fill="#48626c" font-size="10.5" letter-spacing="1"
          font-family="Consolas, 'Courier New', monospace">
      SESSION READY &#8226; NODE-014 &#8226; UPTIME 99.98%
    </text>
  </g>

  <!-- ============ RIGHT: NETWORK ============ -->
  <g transform="translate(850,42)">

    <!-- Links -->
    <g stroke="#3fb8d1" stroke-width="1" opacity="0.4">
      <line x1="30" y1="46" x2="118" y2="22"/>
      <line x1="30" y1="46" x2="104" y2="92"/>
      <line x1="118" y1="22" x2="184" y2="52"/>
      <line x1="104" y1="92" x2="184" y2="52"/>
      <line x1="184" y1="52" x2="244" y2="98"/>
      <line x1="184" y1="52" x2="250" y2="16"/>
      <line x1="250" y1="16" x2="308" y2="36"/>
      <line x1="244" y1="98" x2="308" y2="116"/>
      <line x1="308" y1="36" x2="308" y2="116"/>
      <line x1="308" y1="116" x2="20" y2="142"/>
      <animate attributeName="opacity" values="0.28;0.48;0.28" dur="6s" repeatCount="indefinite"/>
    </g>

    <!-- Nodes -->
    <g fill="#4fc6d6">
      <circle cx="30" cy="46" r="4">
        <animate attributeName="r" values="4;5;4" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="118" cy="22" r="4">
        <animate attributeName="r" values="4;5;4" begin="0.8s" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="104" cy="92" r="4">
        <animate attributeName="r" values="4;5;4" begin="1.6s" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="184" cy="52" r="5.5">
        <animate attributeName="r" values="5.5;7;5.5" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="244" cy="98" r="4">
        <animate attributeName="r" values="4;5;4" begin="2.4s" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="250" cy="16" r="4">
        <animate attributeName="r" values="4;5;4" begin="3.2s" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="308" cy="36" r="4">
        <animate attributeName="r" values="4;5;4" begin="1.2s" dur="5.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="308" cy="116" r="4">
        <animate attributeName="r" values="4;5;4" begin="2.8s" dur="5.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Status -->
    <text x="0" y="168" fill="#4fae8c" font-size="11" letter-spacing="1"
          font-family="Consolas, 'Courier New', monospace" opacity="0.9">
      NETWORK STATUS : CONNECTED
    </text>
  </g>

</svg>
