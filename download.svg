<svg width="1200" height="500" viewBox="0 0 1200 500"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0908"/>
      <stop offset="55%" stop-color="#181110"/>
      <stop offset="100%" stop-color="#0d0908"/>
    </linearGradient>

    <linearGradient id="coffeeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8a5a34"/>
      <stop offset="100%" stop-color="#c9975f"/>
    </linearGradient>

    <linearGradient id="panelFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6f4e37" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6f4e37" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="footerFade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6f4e37" stop-opacity="0"/>
      <stop offset="100%" stop-color="#6f4e37" stop-opacity="0.12"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Fine grid, very subtle -->
  <g opacity="0.04">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200" stroke="#c9975f"/>
    <path d="M150 0 V500 M300 0 V500 M450 0 V500 M600 0 V500
             M750 0 V500 M900 0 V500 M1050 0 V500" stroke="#c9975f"/>
  </g>

  <!-- Outer frame -->
  <rect x="6" y="6" width="1188" height="488" rx="10"
        fill="none" stroke="#8a5a34" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- ============ LEFT: BRAND PANEL ============ -->
  <g>
    <rect x="0" y="0" width="390" height="500" fill="url(#panelFade)"/>
    <line x1="390" y1="20" x2="390" y2="480" stroke="#8a5a34" stroke-opacity="0.4" stroke-width="1"/>

    <!-- Mark -->
    <g transform="translate(48,52)">
      <polygon points="16,0 32,9 32,27 16,36 0,27 0,9"
               fill="none" stroke="#c9975f" stroke-width="2"/>
      <circle cx="16" cy="18" r="4" fill="#c9975f"/>
    </g>

    <text x="94" y="66" fill="#c9975f" font-size="13" letter-spacing="4"
          font-family="Consolas, 'Courier New', monospace">SAULOS TECH</text>

    <text x="48" y="140" fill="#ffffff" font-size="38" font-weight="700"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      WELCOME TO
    </text>
    <text x="48" y="184" fill="#ffffff" font-size="38" font-weight="700"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      CYBERCAFE
    </text>

    <rect x="49" y="202" width="64" height="3" fill="#c9975f"/>

    <text x="48" y="234" fill="#cabcaf" font-size="14"
          font-family="'Segoe UI', Helvetica, Arial, sans-serif">
      High-speed internet &#183; Printing &#183; IT support
    </text>

    <!-- Secure Access badge -->
    <g transform="translate(48,268)">
      <path d="M40 0 L74 12 V46 C74 74 56 92 40 100 C24 92 6 74 6 46 V12 Z"
            fill="none" stroke="#c9975f" stroke-width="2"/>
      <path d="M40 0 L74 12 V46 C74 74 56 92 40 100 C24 92 6 74 6 46 V12 Z"
            fill="#c9975f" fill-opacity="0.06"/>
      <rect x="24" y="42" width="32" height="22" rx="3" fill="none" stroke="#ffffff" stroke-width="2"/>
      <path d="M30 42 V33 a10 10 0 0 1 20 0 V42" fill="none" stroke="#ffffff" stroke-width="2"/>
      <circle cx="40" cy="53" r="2.6" fill="#ffffff">
        <animate attributeName="opacity" values="1;0.35;1" dur="2.6s" repeatCount="indefinite"/>
      </circle>

      <text x="94" y="18" fill="#ffffff" font-size="13" font-weight="600"
            font-family="'Segoe UI', Helvetica, Arial, sans-serif">SECURE ACCESS</text>
      <text x="94" y="40" fill="#c9975f" font-size="12"
            font-family="Consolas, 'Courier New', monospace">firewall: enabled</text>
      <text x="94" y="60" fill="#c9975f" font-size="12"
            font-family="Consolas, 'Courier New', monospace">encryption: AES-256</text>
      <text x="94" y="80" fill="#c9975f" font-size="12"
            font-family="Consolas, 'Courier New', monospace">
        threat_scan: clear
        <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
      </text>
    </g>

    <text x="48" y="452" fill="#8a5a34" font-size="12" letter-spacing="2"
          font-family="Consolas, 'Courier New', monospace">
      POWERED BY SAULOS TECH
    </text>
  </g>

  <!-- ============ CENTER: TERMINAL / CODE ============ -->
  <g transform="translate(430,0)">

    <text x="0" y="44" fill="#ffffff" font-size="14" letter-spacing="3"
          font-family="Consolas, 'Courier New', monospace">
      SYSTEM INITIALIZATION
    </text>

    <!-- Terminal window -->
    <rect x="0" y="58" width="360" height="140" rx="8"
          fill="#151010" stroke="#8a5a34" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="16" cy="74" r="4" fill="#c9975f"/>
    <circle cx="30" cy="74" r="4" fill="#8a5a34"/>
    <circle cx="44" cy="74" r="4" fill="#ffffff" fill-opacity="0.5"/>

    <g fill="#e8ddd0" font-family="Consolas, 'Courier New', monospace" font-size="12.5">
      <text x="16" y="98">&gt; const protocol = "ACTIVE";</text>
      <text x="16" y="118">&gt; encrypt(data_stream);</text>
      <text x="16" y="138">&gt; sync_nodes(1024);</text>
      <text x="16" y="158">&gt; await secureHandshake();</text>
      <text x="16" y="178" fill="#c9975f">&gt; SYSTEM.STATUS = ONLINE;
        <animate attributeName="opacity" values="1;0.4;1" dur="2.2s" repeatCount="indefinite"/>
      </text>
    </g>

    <!-- Typing cursor -->
    <rect x="216" y="168" width="7" height="13" fill="#c9975f">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>

    <!-- Progress -->
    <text x="0" y="228" fill="#e8ddd0" font-size="12.5"
          font-family="Consolas, 'Courier New', monospace" letter-spacing="1">
      LOADING CORE MODULES...
    </text>

    <rect x="0" y="240" width="360" height="10" rx="5"
          fill="#151010" stroke="#8a5a34" stroke-opacity="0.5" stroke-width="1"/>
    <rect x="0" y="240" width="80" height="10" rx="5" fill="url(#coffeeGradient)">
      <animate attributeName="width" values="80;330;80" dur="7s" repeatCount="indefinite"/>
    </rect>

    <text x="0" y="278" fill="#8a5a34" font-size="11" letter-spacing="1"
          font-family="Consolas, 'Courier New', monospace">
      SESSION READY &#8226; NODE-014 &#8226; UPTIME 99.98%
    </text>

    <!-- Security Operations Log -->
    <text x="0" y="322" fill="#ffffff" font-size="13" letter-spacing="2"
          font-family="Consolas, 'Courier New', monospace">
      SECURITY OPERATIONS LOG
    </text>

    <rect x="0" y="336" width="360" height="128" rx="8"
          fill="#151010" stroke="#8a5a34" stroke-opacity="0.4" stroke-width="1"/>

    <g font-family="Consolas, 'Courier New', monospace" font-size="12">
      <text x="16" y="360" fill="#e8ddd0">[OK] intrusion_detection --status</text>
      <text x="16" y="380" fill="#e8ddd0">[OK] vpn_tunnel.connect(client_014)</text>
      <text x="16" y="400" fill="#c9975f">[WARN] port_scan detected</text>
      <text x="16" y="420" fill="#e8ddd0">[OK] auto_block(source_ip); logged;</text>
      <text x="16" y="440" fill="#e8ddd0">
        [OK] malware_scan: 0 threats found
        <animate attributeName="opacity" values="1;0.4;1" dur="2.4s" repeatCount="indefinite"/>
      </text>
    </g>

    <rect x="196" y="430" width="6" height="11" fill="#e8ddd0">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- ============ RIGHT: NETWORK + RADAR ============ -->
  <g transform="translate(850,50)">

    <!-- Links -->
    <g stroke="#8a5a34" stroke-width="1.2" opacity="0.6">
      <line x1="30" y1="60" x2="120" y2="30"/>
      <line x1="30" y1="60" x2="105" y2="120"/>
      <line x1="120" y1="30" x2="190" y2="70"/>
      <line x1="105" y1="120" x2="190" y2="70"/>
      <line x1="190" y1="70" x2="250" y2="130"/>
      <line x1="190" y1="70" x2="255" y2="20"/>
      <line x1="255" y1="20" x2="315" y2="45"/>
      <line x1="250" y1="130" x2="315" y2="150"/>
      <line x1="315" y1="45" x2="315" y2="150"/>
      <line x1="315" y1="150" x2="20" y2="185"/>
    </g>

    <!-- Nodes -->
    <g fill="#e8ddd0">
      <circle cx="30" cy="60" r="4.5"/>
      <circle cx="120" cy="30" r="4.5"/>
      <circle cx="105" cy="120" r="4.5"/>
      <circle cx="190" cy="70" r="6" fill="#c9975f">
        <animate attributeName="opacity" values="1;0.5;1" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="250" cy="130" r="4.5"/>
      <circle cx="255" cy="20" r="4.5"/>
      <circle cx="315" cy="45" r="4.5"/>
      <circle cx="315" cy="150" r="4.5"/>
    </g>

    <text x="0" y="220" fill="#ffffff" font-size="12" letter-spacing="1"
          font-family="Consolas, 'Courier New', monospace">
      NETWORK STATUS : CONNECTED
    </text>

    <!-- Radar -->
    <g transform="translate(160,330)">
      <text x="-160" y="-10" fill="#ffffff" font-size="12" letter-spacing="2"
            font-family="Consolas, 'Courier New', monospace">THREAT RADAR</text>

      <circle r="85" fill="#151010" stroke="#8a5a34" stroke-opacity="0.5" stroke-width="1.4"/>
      <circle r="56" fill="none" stroke="#8a5a34" stroke-opacity="0.3" stroke-width="1"/>
      <circle r="28" fill="none" stroke="#8a5a34" stroke-opacity="0.3" stroke-width="1"/>
      <line x1="-85" y1="0" x2="85" y2="0" stroke="#8a5a34" stroke-opacity="0.25"/>
      <line x1="0" y1="-85" x2="0" y2="85" stroke="#8a5a34" stroke-opacity="0.25"/>

      <g>
        <path d="M0 0 L0 -85 A85 85 0 0 1 60.1 -60.1 Z" fill="#c9975f" opacity="0.22"/>
        <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0"
                           dur="6s" repeatCount="indefinite"/>
      </g>

      <circle cx="33" cy="-19" r="3" fill="#ffffff">
        <animate attributeName="opacity" values="0;1;0" dur="3.4s" begin="0.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="-46" cy="28" r="3" fill="#c9975f">
        <animate attributeName="opacity" values="0;1;0" dur="4s" begin="1.6s" repeatCount="indefinite"/>
      </circle>

      <circle r="3.5" fill="#e8ddd0"/>
    </g>

    <g font-family="Consolas, 'Courier New', monospace" font-size="11" fill="#c9975f">
      <text x="-40" y="460">scan.run(target="LAN");</text>
      <text x="-40" y="480">status = "SECURED";</text>
    </g>
  </g>

  <!-- ============ FOOTER STRIP ============ -->
  <rect x="6" y="458" width="1188" height="36" fill="url(#footerFade)"/>
  <line x1="0" y1="458" x2="1200" y2="458" stroke="#8a5a34" stroke-opacity="0.35" stroke-width="1"/>
  <g font-family="Consolas, 'Courier New', monospace" font-size="11.5" fill="#c9975f" opacity="0.9">
    <text x="30" y="481">SSL/TLS SECURED</text>
    <text x="240" y="481">24/7 MONITORING</text>
    <text x="470" y="481">DATA PRIVACY COMPLIANT</text>
    <text x="760" y="481">BACKUP: AUTOMATED</text>
    <text x="990" y="481" fill="#ffffff">UPTIME 99.98%</text>
  </g>

</svg>
