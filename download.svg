<line x1="420" y1="120" x2="380" y2="180"><animate attributeName="opacity" values="0.45;0.15;0.45" dur="2.7s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="550" y1="150" x2="620" y2="90"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.9s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="550" y1="150" x2="700" y2="140"><animate attributeName="opacity" values="0.5;0.2;0.5" dur="2.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="620" y1="90" x2="700" y2="140"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="3.3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="620" y1="90" x2="750" y2="60"><animate attributeName="opacity" values="0.45;0.15;0.45" dur="2.8s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="380" y1="180" x2="450" y2="220"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="3.5s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="380" y1="180" x2="550" y2="200"><animate attributeName="opacity" values="0.5;0.18;0.5" dur="2.3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="450" y1="220" x2="550" y2="200"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="4s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="700" y1="140" x2="750" y2="60"><animate attributeName="opacity" values="0.45;0.2;0.45" dur="3s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="700" y1="140" x2="650" y2="210"><animate attributeName="opacity" values="0.2;0.5;0.2" dur="2.6s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="550" y1="200" x2="650" y2="210"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="3.7s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
<line x1="650" y1="210" x2="750" y2="60"><animate attributeName="opacity" values="0.15;0.45;0.15" dur="2.2s" calcMode="spline" keyTimes="0;0.5;1" keySplines="0.4 0 0.2 1;0.4 0 0.2 1" repeatCount="indefinite"/></line>
</g>

<g fill="#00ccff" filter="url(#nodeGlow)">
<circle cx="380" cy="100" r="4"><animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/></circle>
<circle cx="450" cy="180" r="4"><animate attributeName="cx" values="450;459;450" dur="4.5s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.8;2.6;1.8" dur="2.3s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="500" cy="100" r="4"><animate attributeName="cy" values="45;53;45" dur="6s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.1;3;2.1" dur="1.9s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="420" cy="180" r="4"><animate attributeName="cx" values="420;411;420" dur="5.3s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.5;2.3;1.5" dur="2.5s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="550" cy="100" r="4"><animate attributeName="cy" values="150;159;150" dur="4.8s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.7;3.6;2.7" dur="2.1s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="620" cy="180" r="4"><animate attributeName="cx" values="620;629;620" dur="5.6s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.9;2.7;1.9" dur="2.4s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="380" cy="100" r="4" ><animate attributeName="cy" values="180;172;180" dur="4.2s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2;2.8;2" dur="2.2s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="700" cy="180" r="4"><animate attributeName="cx" values="700;691;700" dur="5.1s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.2;3.1;2.2" dur="1.8s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="750" cy="140" r="4"><animate attributeName="cy" values="60;69;60" dur="4.7s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.6;2.4;1.6" dur="2.6s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="450" cy="220" r="4"><animate attributeName="cx" values="450;441;450" dur="5.4s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.9;2.7;1.9" dur="2s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="550" cy="200" r="4"><animate attributeName="cy" values="200;208;200" dur="4.4s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="2.6;3.5;2.6" dur="2.3s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
<circle cx="650" cy="210" r="4"><animate attributeName="cx" values="650;659;650" dur="5.8s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/><animate attributeName="r" values="1.8;2.6;1.8" dur="1.9s" calcMode="spline" keySplines="0.45 0 0.55 1;0.45 0 0.55 1" repeatCount="indefinite"/></circle>
