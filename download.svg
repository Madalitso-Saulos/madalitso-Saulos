<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Consolas, 'Courier New', monospace">

  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00ff9c" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00ff9c" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="frameClip">
      <rect x="20" y="20" width="860" height="380" rx="14"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#bgGrad)"/>

  <!-- Outer frame -->
  <rect x="20" y="20" width="860" height="380" rx="14" fill="#0b1220" stroke="#1f8a70" stroke-width="1.5"/>
  <rect x="20" y="20" width="860" height="380" rx="14" fill="url(#screenGlow)"/>

  <g clip-path="url(#frameClip)">
    <!-- Falling matrix-style code columns -->
    <g font-size="14" fill="#0f5132" opacity="0.55">
      <text x="40"  y="0" fill="#16a34a">
        <animate attributeName="y" from="-400" to="420" dur="6s" repeatCount="indefinite"/>
        10110 fx3a c2:ff 9d0e
      </text>
      <text x="95"  y="0" fill="#16a34a">
        <animate attributeName="y" from="-500" to="420" dur="7.5s" begin="0.5s" repeatCount="indefinite"/>
        sudo rm -rf /tmp/log
      </text>
      <text x="150" y="0" fill="#16a34a">
        <animate attributeName="y" from="-350" to="420" dur="5.2s" begin="1s" repeatCount="indefinite"/>
        0xFF 0x1A encrypt()
      </text>
      <text x="205" y="0" fill="#16a34a">
        <animate attributeName="y" from="-450" to="420" dur="8s" begin="0.2s" repeatCount="indefinite"/>
        SSH:22 TCP SYN ACK
      </text>
      <text x="720" y="0" fill="#16a34a">
        <animate attributeName="y" from="-400" to="420" dur="6.6s" begin="0.8s" repeatCount="indefinite"/>
        firewall.allow(443)
      </text>
      <text x="780" y="0" fill="#16a34a">
        <animate attributeName="y" from="-500" to="420" dur="7s" begin="1.4s" repeatCount="indefinite"/>
        hash: 9f8a2b1c
      </text>
      <text x="835" y="0" fill="#16a34a">
        <animate attributeName="y" from="-350" to="420" dur="5.8s" begin="0.3s" repeatCount="indefinite"/>
        VPN tunnel up
      </text>
    </g>
  </g>

  <!-- Terminal window bar -->
  <rect x="60" y="60" width="500" height="34" rx="8" fill="#111827"/>
  <circle cx="80" cy="77" r="6" fill="#ff5f56"/>
  <circle cx="100" cy="77" r="6" fill="#ffbd2e"/>
  <circle cx="120" cy="77" r="6" fill="#27c93f"/>
  <text x="330" y="82" fill="#7dd3fc" font-size="13" text-anchor="middle">user@cybercafe: ~</text>

  <!-- Code-style terminal content -->
  <g font-size="15" fill="#9ca3af">
    <text x="72" y="120">$ <tspan fill="#7dd3fc">connect</tspan> --host=cybercafe.local</text>
    <text x="72" y="145" fill="#4ade80">[OK] Secure channel established</text>
  </g>

  <!-- Typing "Welcome to Cybercafe" effect -->
  <g filter="url(#glow)">
    <text x="72" y="200" font-size="34" font-weight="bold" fill="#00ff9c">
      <tspan>&gt;_ </tspan><tspan id="typedText"></tspan>
    </text>
  </g>

  <!-- Simulated typewriter using clipped reveal -->
  <clipPath id="typeClip">
    <rect x="0" y="0" height="50" width="0">
      <animate attributeName="width" from="0" to="480" dur="2.5s" fill="freeze" begin="0.3s"/>
    </rect>
  </clipPath>
  <g clip-path="url(#typeClip)" filter="url(#glow)">
    <text x="132" y="200" font-size="34" font-weight="bold" fill="#00ff9c">Welcome to Cybercafe</text>
  </g>
  <!-- blinking cursor -->
  <rect x="132" y="177" width="4" height="26" fill="#00ff9c">
    <animate attributeName="width" values="4;4" dur="0.1s" begin="0.3s" fill="freeze"/>
    <animate attributeName="x" values="132;612" dur="2.5s" begin="0.3s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" begin="2.8s"/>
  </rect>

  <!-- Subheading line, code style -->
  <text x="72" y="240" font-size="14" fill="#64748b">
    // grab a seat, plug in, and browse securely
  </text>

  <!-- Status readout lines -->
  <g font-size="13" fill="#64748b">
    <text x="72" y="275">status: <tspan fill="#4ade80">ONLINE</tspan></text>
    <text x="72" y="298">encryption: <tspan fill="#4ade80">AES-256</tspan></text>
    <text x="72" y="321">firewall: <tspan fill="#4ade80">ACTIVE</tspan></text>
    <text x="72" y="344">threats_blocked: <tspan fill="#facc15">1,204</tspan></text>
  </g>

  <!-- Progress bar -->
  <rect x="72" y="365" width="300" height="8" rx="4" fill="#1f2937"/>
  <rect x="72" y="365" width="0" height="8" rx="4" fill="#00ff9c">
    <animate attributeName="width" values="0;300;0" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Divider -->
  <line x1="620" y1="60" x2="620" y2="380" stroke="#1f2937" stroke-width="1"/>

  <!-- ===== Security icons column on right ===== -->
  <g transform="translate(660,80)">

    <!-- Shield icon -->
    <g transform="translate(0,0)">
      <path d="M40 0 L75 12 V45 C75 70 55 85 40 92 C25 85 5 70 5 45 V12 Z"
            fill="#0b1220" stroke="#22d3ee" stroke-width="2.5"/>
      <path d="M25 45 L36 56 L58 30" fill="none" stroke="#22d3ee" stroke-width="4"
            stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="stroke-dasharray" values="0,60;60,60" dur="2s" repeatCount="indefinite"/>
      </path>
      <animateTransform attributeName="transform" type="scale" values="1;1.06;1"
                         dur="2.4s" repeatCount="indefinite" additive="sum"/>
    </g>
    <text x="40" y="112" font-size="11" fill="#64748b" text-anchor="middle">FIREWALL</text>

    <!-- Padlock icon -->
    <g transform="translate(0,140)">
      <rect x="10" y="35" width="55" height="42" rx="6" fill="#0b1220" stroke="#facc15" stroke-width="2.5"/>
      <path d="M20 35 V22 a17.5 17.5 0 0 1 35 0 V35" fill="none" stroke="#facc15" stroke-width="4"/>
      <circle cx="37.5" cy="56" r="5" fill="#facc15">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.6s" repeatCount="indefinite"/>
      </circle>
      <rect x="34.5" y="60" width="6" height="10" fill="#facc15"/>
    </g>
    <text x="40" y="252" font-size="11" fill="#64748b" text-anchor="middle">ENCRYPTED</text>

    <!-- Key icon -->
    <g transform="translate(2,280)">
      <circle cx="18" cy="18" r="15" fill="#0b1220" stroke="#a78bfa" stroke-width="3"/>
      <circle cx="18" cy="18" r="6" fill="none" stroke="#a78bfa" stroke-width="2.5"/>
      <rect x="32" y="15" width="34" height="6" fill="#a78bfa"/>
      <rect x="55" y="21" width="6" height="10" fill="#a78bfa"/>
      <rect x="45" y="21" width="6" height="8" fill="#a78bfa"/>
      <animateTransform attributeName="transform" type="rotate" values="0 18 18;15 18 18;0 18 18"
                         dur="2.2s" repeatCount="indefinite"/>
    </g>
    <text x="40" y="382" font-size="11" fill="#64748b" text-anchor="middle">ACCESS KEY</text>

    <!-- Wifi / signal icon -->
    <g transform="translate(5,405)">
      <circle cx="35" cy="40" r="4" fill="#38bdf8"/>
      <path d="M20 30 a21 21 0 0 1 30 0" fill="none" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" repeatCount="indefinite"/>
      </path>
      <path d="M10 18 a35 35 0 0 1 50 0" fill="none" stroke="#38bdf8" stroke-width="3.5" stroke-linecap="round">
        <animate attributeName="opacity" values="0.2;1;0.2" dur="1.8s" begin="0.3s" repeatCount="indefinite"/>
      </path>
    </g>
    <text x="40" y="452" font-size="11" fill="#64748b" text-anchor="middle">SECURE WIFI</text>

  </g>

  <!-- Bottom footer strip -->
  <rect x="20" y="372" width="860" height="28" rx="0" fill="#0b1220" opacity="0.001"/>
  <text x="450" y="392" font-size="11" fill="#334155" text-anchor="middle">
    session_id: 0xA1B2C3 // stay safe, stay encrypted
  </text>

</svg>
