<svg width="680" height="400" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2E5FE0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .cursor { animation: blink 1s steps(1) infinite; }
      @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

      .line { stroke-dasharray: 4 4; animation: flow 2.4s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -16; } }

      .node { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
      .node:nth-child(2) { animation-delay: .3s; }
      .node:nth-child(3) { animation-delay: .6s; }
      .node:nth-child(4) { animation-delay: .9s; }
      .node:nth-child(5) { animation-delay: .2s; }
      .node:nth-child(6) { animation-delay: .7s; }
      .node:nth-child(7) { animation-delay: .5s; }
      @keyframes pulse { 0%, 100% { opacity: 0.75; } 50% { opacity: 1; } }

      .fade-up { opacity: 0; animation: fadeUp .8s ease-out forwards; }
      .fade-up.d1 { animation-delay: .1s; }
      .fade-up.d2 { animation-delay: .4s; }
      @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

      .bar-fill { animation: fill 1.6s ease-out forwards; }
      @keyframes fill { from { width: 0; } to { width: 270px; } }

      .code-line { opacity: 0; animation: fadeUp .5s ease-out forwards; }
    </style>
  </defs>

  <rect x="0" y="0" width="680" height="400" fill="#0A0C0F"/>
  <rect x="0" y="0" width="680" height="400" fill="none" stroke="#2A2E35" stroke-width="1"/>

  <g font-family="monospace" font-size="12" fill="#3FCF6A">
    <text class="code-line" x="24" y="46" style="animation-delay:.1s">const dev = {</text>
    <text class="code-line" x="40" y="66" fill="#8B93A1" style="animation-delay:.2s">name: <tspan fill="#F2C572">'Saulo'</tspan>,</text>
    <text class="code-line" x="40" y="86" fill="#8B93A1" style="animation-delay:.3s">stack: <tspan fill="#F2C572">['JS','Go','Rust']</tspan>,</text>
    <text class="code-line" x="40" y="106" fill="#8B93A1" style="animation-delay:.4s">building: <tspan fill="#F2C572">true</tspan>,</text>
    <text class="code-line" x="24" y="126" style="animation-delay:.5s">};</text>
    <text class="code-line" x="24" y="156" style="animation-delay:.6s">function deploy() {</text>
    <text class="code-line" x="40" y="176" fill="#8B93A1" style="animation-delay:.7s">git.push(<tspan fill="#5FB7F7">'origin'</tspan>);</text>
    <text class="code-line" x="40" y="196" fill="#8B93A1" style="animation-delay:.8s">ci.run();</text>
    <text class="code-line" x="24" y="216" style="animation-delay:.9s">}</text>
    <text class="code-line" x="24" y="246" style="animation-delay:1s">export default dev;</text>
    <text class="code-line" x="24" y="276" fill="#8B93A1" style="animation-delay:1.1s">// status: online</text>
    <text class="cursor" x="24" y="296" fill="#5FB7F7">&gt;_</text>
  </g>

  <g class="line" stroke="#2E5FE0" stroke-width="0.6" opacity="0.6">
    <line x1="470" y1="70" x2="540" y2="110" marker-end="url(#arrow)"/>
    <line x1="470" y1="70" x2="430" y2="140" marker-end="url(#arrow)"/>
    <line x1="540" y1="110" x2="600" y2="90" marker-end="url(#arrow)"/>
    <line x1="540" y1="110" x2="560" y2="180" marker-end="url(#arrow)"/>
    <line x1="430" y1="140" x2="480" y2="210" marker-end="url(#arrow)"/>
    <line x1="560" y1="180" x2="620" y2="200" marker-end="url(#arrow)"/>
    <line x1="480" y1="210" x2="560" y2="180" marker-end="url(#arrow)"/>
    <line x1="600" y1="90" x2="560" y2="180" marker-end="url(#arrow)"/>
    <line x1="430" y1="140" x2="540" y2="110" marker-end="url(#arrow)"/>
  </g>

  <g fill="#5FB7F7">
    <circle class="node" cx="470" cy="70" r="5"/>
    <circle class="node" cx="540" cy="110" r="7"/>
    <circle class="node" cx="430" cy="140" r="5"/>
    <circle class="node" cx="600" cy="90" r="4"/>
    <circle class="node" cx="560" cy="180" r="6"/>
    <circle class="node" cx="480" cy="210" r="4"/>
    <circle class="node" cx="620" cy="200" r="4"/>
  </g>

  <text class="fade-up d1" x="340" y="200" text-anchor="middle" font-family="sans-serif" font-size="26" font-weight="500" fill="#F5F6F8" letter-spacing="1">welcome to saulo's github</text>
  <text class="fade-up d2" x="340" y="226" text-anchor="middle" font-family="monospace" font-size="12" fill="#5FB7F7">git clone &amp; explore the code</text>

  <rect x="140" y="320" width="400" height="8" rx="4" fill="#1C1F26" stroke="#2A2E35" stroke-width="0.5"/>
  <rect class="bar-fill" x="140" y="320" height="8" rx="4" fill="#3FCF6A"/>
  <text x="340" y="346" text-anchor="middle" font-family="monospace" font-size="12" fill="#8B93A1">loading repositories... 68%</text>
</svg>
