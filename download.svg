<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="260" viewBox="0 0 800 260" style="background:#000;border-radius:12px;font-family:'Courier New',monospace;">
  <defs>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b5342c"/>
      <stop offset="100%" style="stop-color:#3ab0ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#3ab0ff" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Network lines -->
  <g stroke="#3ab0ff" stroke-width="0.6" opacity="0.35">
    <line x1="380" y1="30" x2="450" y2="80"/>
    <line x1="380" y1="30" x2="500" y2="45"/>
    <line x1="380" y1="30" x2="420" y2="120"/>
    <line x1="450" y1="80" x2="500" y2="45"/>
    <line x1="450" y1="80" x2="550" y2="150"/>
    <line x1="450" y1="80" x2="420" y2="120"/>
    <line x1="500" y1="45" x2="620" y2="90"/>
    <line x1="500" y1="45" x2="550" y2="150"/>
    <line x1="420" y1="120" x2="550" y2="150"/>
    <line x1="420" y1="120" x2="380" y2="180"/>
    <line x1="550" y1="150" x2="620" y2="90"/>
    <line x1="550" y1="150" x2="700" y2="140"/>
    <line x1="620" y1="90" x2="700" y2="140"/>
    <line x1="620" y1="90" x2="750" y2="60"/>
    <line x1="380" y1="180" x2="450" y2="220"/>
    <line x1="380" y1="180" x2="550" y2="200"/>
    <line x1="450" y1="220" x2="550" y2="200"/>
    <line x1="700" y1="140" x2="750" y2="60"/>
    <line x1="700" y1="140" x2="650" y2="210"/>
    <line x1="550" y1="200" x2="650" y2="210"/>
    <line x1="650" y1="210" x2="750" y2="60"/>
  </g>

  <!-- Network nodes -->
  <g fill="#3ab0ff" filter="url(#shadow)">
    <circle cx="380" cy="30" r="2.5"/>
    <circle cx="450" cy="80" r="1.8"/>
    <circle cx="500" cy="45" r="2.2"/>
    <circle cx="420" cy="120" r="1.5"/>
    <circle cx="550" cy="150" r="2.8"/>
    <circle cx="620" cy="90" r="1.9"/>
    <circle cx="380" cy="180" r="2.1"/>
    <circle cx="700" cy="140" r="2.3"/>
    <circle cx="750" cy="60" r="1.6"/>
    <circle cx="450" cy="220" r="2.0"/>
    <circle cx="550" cy="200" r="2.7"/>
    <circle cx="650" cy="210" r="1.8"/>
  </g>

  <!-- Left panel - terminal text -->
  <foreignObject x="0" y="0" width="368" height="260">
    <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;overflow:hidden;display:flex;flex-direction:column;justify-content:center;padding-left:20px;font-size:11px;line-height:1.7;white-space:pre;font-family:'Courier New',monospace;color:#e8e8e8;">
      <div style="color:#b5342c;opacity:0.6;">root@cybercafe:~$ ssh admin@10.0.0.1</div>
      <div style="color:#e8e8e8;opacity:0.9;">Connecting to node 0x4F2A...</div>
      <div style="color:#e8e8e8;opacity:0.4;">PING 192.168.1.1 56(84) bytes</div>
      <div style="color:#e8e8e8;opacity:0.8;">[ OK ] Started network daemon</div>
      <div style="color:#b5342c;opacity:0.7;">sudo systemctl status firewall</div>
      <div style="color:#e8e8e8;opacity:0.5;">drwxr-xr-x 3 root root 4096</div>
      <div style="color:#e8e8e8;opacity:0.9;">PID 8821 TTY pts/2 CPU 0.3%</div>
      <div style="color:#e8e8e8;opacity:0.6;">Mounting /dev/sda1 on /mnt</div>
      <div style="color:#b5342c;opacity:0.8;">kernel: eth0 link up 1Gbps</div>
      <div style="color:#e8e8e8;opacity:0.4;">> decrypting packet 0x9B1C</div>
      <div style="color:#e8e8e8;opacity:0.7;">auth: token accepted [200]</div>
    </div>
  </foreignObject>

  <!-- Right panel - loading -->
  <g transform="translate(36,0)">
    <foreignObject x="0" y="80" width="150" height="100">
      <div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;">
        <div style="display:flex;justify-content:space-between;font-size:10px;color:#3ab0ff;margin-bottom:5px;letter-spacing:1px;">
          <span>LOADING</span>
          <span>67%</span>
        </div>
        <div style="width:100%;height:4px;background:#111;border:1px solid #1d3a4a;border-radius:2px;overflow:hidden;">
          <div style="height:100%;width:67%;background:linear-gradient(90deg,#b5342c,#3ab0ff);box-shadow:0 0 6px rgba(58,176,255,0.8);"></div>
        </div>
      </div>
    </foreignObject>
  </g>
</svg>
