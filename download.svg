<!-- Cyber Loading Bar -->
<g transform="translate(230 215)">

  <!-- Loading Container -->
  <rect x="0" y="0" width="300" height="18"
        rx="9"
        fill="none"
        stroke="#00ffff"
        stroke-width="2"/>

  <!-- Animated Loading -->
  <rect x="5" y="5" width="60" height="8"
        rx="4"
        fill="#00ffff"
        filter="url(#glow)">

    <animate attributeName="width"
             values="60;280;60"
             dur="3s"
             repeatCount="indefinite"/>

  </rect>


  <text x="80" y="45"
        fill="#00ffff"
        font-size="12"
        font-family="monospace">
        SYSTEM LOADING...
  </text>

</g>



<!-- Moving Binary Data -->
<g fill="#00ffff"
   font-family="monospace"
   font-size="14"
   filter="url(#glow)">

<!-- Binary Column 1 -->
<text x="90" y="250">
101010
<animate attributeName="y"
values="250;120;250"
dur="4s"
repeatCount="indefinite"/>
</text>


<!-- Binary Column 2 -->
<text x="160" y="270">
010011
<animate attributeName="y"
values="270;90;270"
dur="3.5s"
repeatCount="indefinite"/>
</text>


<!-- Binary Column 3 -->
<text x="620" y="250">
110101
<animate attributeName="y"
values="250;130;250"
dur="4.5s"
repeatCount="indefinite"/>
</text>


<!-- Binary Column 4 -->
<text x="700" y="270">
001101
<animate attributeName="y"
values="270;100;270"
dur="3s"
repeatCount="indefinite"/>
</text>


</g>



<!-- Digital Binary Rain -->
<g fill="#00ffff"
font-family="monospace"
font-size="10"
opacity="0.7">


<text x="40" y="280">
101010101
<animate attributeName="y"
values="280;150;280"
dur="5s"
repeatCount="indefinite"/>
</text>


<text x="760" y="280">
010101010
<animate attributeName="y"
values="280;130;280"
dur="4s"
repeatCount="indefinite"/>
</text>


</g>
